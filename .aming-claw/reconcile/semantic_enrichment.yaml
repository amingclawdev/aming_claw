graph_enrich_config_ops:
  rules:
    calls.weak_resolver.short_name_add_method_drop:
      action: drop
      downgrade_to: ''
      edge: calls
      op: add_rule
      reason: R4 semantic dogfood L7.121 found false weak-call evidence from chained
        collection/setdefault .add calls; gate passed in dry-run event ge-791013377fe0.
      source_evidence: weak_call_resolver_ambiguous_short_name
      when:
        all:
        - predicate: source_evidence_is
          value: weak_call_resolver_ambiguous_short_name
        - predicate: raw_target_in
          values:
          - add
        - predicate: call_syntax_is
          value: method
    emits_event.string_literal.exclude_cli_executable_names:
      action: reject
      downgrade_to: ignore
      edge: emits_event
      op: tighten_rule
      reason: R5 semantic dogfood found CLI executable fallback names in reconcile_semantic_ai.py
        being materialized as emits_event relations; these are shutil.which candidates,
        not EventBus or chain event names.
      source_evidence: string_literal
      when:
        all:
        - predicate: source_evidence_is
          value: string_literal
        - predicate: raw_target_in
          values:
          - claude_cmd
          - claude_exe
          - codex_cmd
          - codex_ps1
    emits_event.string_literal.exclude_library_method_and_module_tokens:
      action: reject
      downgrade_to: ignore
      edge: emits_event
      op: tighten_rule
      reason: R6 semantic dogfood L7.121 found library method, module, fixture, and
        config-path string literals materialized as emits_event. These are graph-builder
        vocabulary tokens, not event names; also covers the L7.142 governance.db observation.
      source_evidence: string_literal
      when:
        all:
        - predicate: source_evidence_is
          value: string_literal
        - predicate: raw_target_in
          values:
          - server_tool
          - server_resource
          - server_prompt
          - pytest_fixture
          - json_dump
          - os_replace
          - shutil_copy
          - conftest_py
          - governance_db
          - pipeline_config_yaml_example
          - agent_core
          - agent_governance_external_project_governance
          - agent_governance_mcp_server
          - agent_governance_reconcile_semantic_config
          - agent_governance_role_config
          - agent_pipeline_config
          - agent_project_config
    emits_event.string_literal.exclude_subprocess_script_paths:
      action: reject
      downgrade_to: ignore
      edge: emits_event
      op: add_rule
      reason: R6 semantic dogfood L7.158 found executor_worker.py materialized as
        emits_event; it is a subprocess script path used by MCP server startup, not
        an event topic.
      source_evidence: string_literal
      when:
        all:
        - predicate: source_evidence_is
          value: string_literal
        - predicate: raw_target_in
          values:
          - executor_worker_py
    tests.test_import_fanin.require_direct_symbol_import:
      action: require_direct_symbol_import
      downgrade_to: weak_tests
      edge: tests
      op: tighten_rule
      reason: Synthesized from 8 dogfood graph_enrich_config proposals; requires direct
        test symbol import and preserves weak test evidence.
      source_evidence: test_import_fanin
      when:
        all:
        - predicate: source_evidence_is
          value: test_import_fanin
graph_structure_ops:
  evidence_policy:
    dedupe_operations: true
