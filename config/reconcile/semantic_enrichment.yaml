version: "1.0"
analyzer: reconcile_semantic
provider: anthropic
model: "claude-opus-4-7"
analyzer_role: reconcile_semantic_analyzer
# chain_role is only used when provider is "pipeline" or "role" to reuse
# standard chain model routing. It does not mean this analyzer is the PM stage.
chain_role: pm
# Machine-specific projects can override these with absolute paths in
# .aming-claw/reconcile/semantic_enrichment.yaml.
executables:
  anthropic: claude
  openai: codex
use_ai_default: false
temperature: 0
max_tokens: 4000

permissions:
  can:
    - read_graph_snapshot
    - read_governance_index
    - read_feature_context
    - read_review_feedback
    - emit_semantic_index
    - emit_review_suggestions
  cannot:
    - modify_code
    - modify_docs
    - modify_tests
    - mutate_graph_topology
    - run_command
    - execute_script
    - create_chain_task
    - finalize_snapshot

input_policy:
  include_source_excerpt: true
  max_excerpt_chars: 12000
  include_symbol_refs: true
  include_doc_refs: true
  include_config_refs: true
  include_review_feedback: true
  include_file_hashes: true

execution_policy:
  # The default full/scope semantic path is one feature per AI call. Batch mode
  # is available only when callers explicitly set semantic_ai_input_mode=batch.
  ai_input_mode: feature
  dynamic_semantic_graph_state: true
  # Large nodes are planned as function slices and deterministically aggregated
  # into one node semantic payload. This prevents whole-node prompts from
  # overflowing provider limits while keeping node-level graph truth unchanged.
  chunk_large_nodes: true
  chunk_function_threshold: 80
  chunk_payload_threshold_chars: 90000
  # function_index sends bounded function names/lines/hashes plus an audited
  # retrieval boundary. source_excerpt remains available for explicit fallback.
  chunk_context_mode: function_index
  chunk_max_slices: 16
  chunk_max_functions_per_slice: 40
  chunk_max_source_chars: 12000
  # Worker runtime is config-driven so dogfood runs can temporarily raise
  # throughput without code changes. Code falls back to 4/4/600 if config is
  # absent or invalid.
  worker_max_concurrency: 10
  worker_claim_batch_size: 10
  worker_lease_seconds: 600

automation_policy:
  # External projects start safe: structure graph and queues can be generated
  # without automatically spending model quota or mutating graph state.
  semantic_mode: manual       # manual | enqueue_only | auto
  feedback_review_mode: enqueue_only  # manual | enqueue_only | auto
  graph_apply_mode: manual    # manual | auto_low_risk
  review_workers: 1
  review_lanes:
    - graph_patch_candidate
    - review_required

graph_structure_ops:
  schema_version: graph_structure_ops.v1
  analyzer_role: reconcile_graph_structure_analyzer
  evidence_policy:
    dedupe_operations: true
    calls:
      require_call_evidence: true
      import_only_action: downgrade
      downgrade_to: imports
  bridge_policy:
    calls:
      require_concrete_evidence: true
      weak_evidence_action: downgrade
      downgrade_to: imports
      evidence_kinds:
        - call
        - calls
        - call_reference
        - direct_call
        - function_call
        - function_calls
        - resolved_call
        - resolved_function_call
        - runtime_call
        - strong_call
  operations:
    move_file:
      enabled: true
      materializer: source_hint
      required_fields: [op, hint_id, source_path, target_node_id, role]
      role_allowlist: [config, doc, primary, secondary, test]
      edge_allowlist: []
    add_edge:
      enabled: true
      materializer: source_hint
      required_fields: [op, hint_id, source_path, target_node_id, edge]
      role_allowlist: []
      edge_allowlist: [calls, configures, depends_on, documents, imports, tests, uses]
    suppress_edge:
      enabled: true
      materializer: source_hint
      required_fields: [op, hint_id, source_path, target_node_id, edge]
      role_allowlist: []
      edge_allowlist: [calls, configures, depends_on, documents, imports, tests, uses]

graph_enrich_config_ops:
  schema_version: graph_enrich_config_ops.v1
  rules: {}

job_profiles:
  node:
    analyzer_role: reconcile_node_semantic_analyzer
  edge:
    analyzer_role: reconcile_edge_semantic_analyzer
  global_review:
    analyzer_role: reconcile_global_semantic_reviewer
  graph_structure:
    analyzer_role: reconcile_graph_structure_analyzer
    prompt_template: |-
      You are the reconcile graph structure analyzer.

      Your job is to propose graph structure operations that can be validated
      by the graph_structure_ops.v1 gate and later materialized as source
      hint blocks. You do not modify files, database rows, or graph topology.
      Only emit operations listed in payload.output_contract.supported_operations.

      Return exactly one JSON object:
      {
        "schema_version": "graph_structure_ops.v1",
        "source": {
          "snapshot_id": "<input snapshot_id>",
          "base_commit": "<input commit_sha>",
          "analyzer_role": "reconcile_graph_structure_analyzer"
        },
        "operations": [
          {
            "op": "move_file|add_edge|suppress_edge",
            "hint_id": "stable-machine-id",
            "source_path": "path/from/snapshot/inventory",
            "target_node_id": "L7.x",
            "role": "test|secondary|config|doc",
            "edge": "tests|documents|configures|depends_on|uses|calls|imports",
            "confidence": 0.0,
            "evidence": {"reason": "short evidence from supplied graph context"}
          }
        ],
        "self_check": {
          "valid": true,
          "checked_rules": [
            "schema_version",
            "semantic_bridge_normalized",
            "op_supported",
            "required_fields_present",
            "target_node_exists",
            "source_path_exists",
            "role_allowed",
            "edge_allowed",
            "calls_require_concrete_evidence",
            "calls_self_edge_rejected",
            "conflict_check"
          ],
          "precheck_status": "passed",
          "repair_attempts": 0,
          "max_repair_attempts": 1,
          "known_risks": []
        }
      }

      Only emit operations supported by source hint projection in the current
      gate: move_file, add_edge, and suppress_edge. Do not emit merge_nodes,
      split_node, reparent_node, or direct DB patches.
      Before returning JSON, run your own self-precheck against
      payload.output_contract.self_precheck.checked_rules_required. If a
      relation needs a calls edge but you do not have concrete call evidence,
      emit imports/depends_on or a graph_enrich_config suggestion instead of
      marking the calls proposal valid. The semantic bridge also applies
      payload.instructions.graph_structure_ops.bridge_policy before gate
      submission, so weak calls may be downgraded before validation.
  graph_enrich_config:
    analyzer_role: reconcile_graph_enrich_config_analyzer
    prompt_template: |-
      You are the reconcile graph enrich config analyzer.

      Your job is to propose configuration-rule operations that can be
      validated by the graph_enrich_config_ops.v1 gate and later written to the
      project semantic enrichment override config. You do not modify files,
      database rows, or graph topology. Only emit operations listed in
      payload.output_contract.supported_operations.

      Return exactly one JSON object:
      {
        "schema_version": "graph_enrich_config_ops.v1",
        "source": {
          "analyzer_role": "reconcile_graph_enrich_config_analyzer"
        },
        "operations": [
          {
            "op": "upsert_edge_evidence_policy",
            "rule_id": "stable-machine-id",
            "edge": "calls",
            "source_evidence": "import_only",
            "action": "downgrade|reject|allow",
            "downgrade_to": "imports",
            "confidence": 0.0,
            "evidence": {"reason": "short evidence from supplied graph context"}
          }
        ],
        "self_check": {
          "valid": true,
          "checked_rules": [
            "schema_version",
            "semantic_bridge_normalized",
            "op_supported",
            "required_fields_present",
            "edge_supported_or_canonical_alias",
            "source_evidence_present",
            "action_present",
            "op_action_compatible",
            "config_patch_previewed",
            "observer_approval_required"
          ],
          "precheck_status": "passed",
          "repair_attempts": 0,
          "max_repair_attempts": 1,
          "known_risks": []
        }
      }

      Policy op constraints:
      - Use upsert_edge_evidence_policy only for edge="calls" and
        source_evidence="import_only".
      - For upsert_edge_evidence_policy, action must be one of
        "allow", "downgrade", or "reject".
      - For function_calls, test_import_fanin, weak-call resolver evidence, or
        require_direct_symbol_import behavior, use rule operations such as
        tighten_rule, update_rule, promote_rule, review_rule, or downgrade_rule.
      - Rule operations may include a when.all predicate list. Use only
        predicates from payload.output_contract.supported_predicates; do not
        emit executable code or unregistered predicate names.
      - Rule operation names must match their action direction. For example,
        tighten_rule, downgrade_rule, downgrade_relation_confidence, and
        review_rule must not emit action="allow", action="promote", or
        action="add"; promote_rule must not emit downgrade/drop/ignore/reject
        actions. Follow payload.output_contract.operation_constraints
        .rule_op_action_compatibility and mark op_action_compatible in
        self_check only after verifying it.

      Before returning JSON, run your own self-precheck against
      payload.output_contract.self_precheck.checked_rules_required. Prefer
      canonical edge names from payload.output_contract.supported_edges; when
      using an alias, normalize it in your output or explain the alias risk in
      self_check.known_risks.
  retry:
    analyzer_role: reconcile_semantic_retry_reviewer
  dry_run:
    analyzer_role: reconcile_semantic_dry_run

output_schema:
  required:
    - feature_name
    - semantic_summary
    - intent
    - domain_label
    - doc_coverage_review
    - test_coverage_review
    - dependency_patch_suggestions
    - config_coverage_review
    - applied_feedback_ids
    - self_check
  optional:
    - merge_suggestions
    - split_suggestions
    - dead_code_candidates
    - graph_structure_suggestions
    - graph_enrich_config_suggestions
    - graph_enrich_config_ops
    - rejected_feedback_ids

prompt_template: |-
  You are the reconcile semantic analyzer.

  Your job is to enrich a graph snapshot with semantic labels and review
  suggestions. You are not part of the PM -> Dev -> QA mutation chain.

  Hard constraints:
  - Do not modify source, documentation, tests, database rows, or graph topology.
  - Do not create PM/Dev/QA tasks.
  - Use only the supplied graph snapshot, governance index, feature context,
    source excerpts, and review feedback.
  - Return structured JSON fields only.

  For each feature, identify the user-facing or governance-facing capability,
  summarize intent, review doc/test/config bindings, and suggest dependency/doc/test/config
  corrections as proposals. The caller will store your output as companion
  semantic artifacts for human or observer review.

  Graph direction contract:
  - Follow payload.instructions.graph_contract and payload.graph_query_context.graph_contract.
  - In deps_graph, depends_on edges are dependency -> dependent for impact
    analysis. If module A imports or calls module B, the canonical deps_graph
    edge is B -> A. Do not report that edge as reversed.
  - Function call facts remain caller -> callee. Do not confuse function fact
    direction with collapsed deps_graph depends_on direction.

  When a graph correction is concrete and source-hint compatible, also emit it
  in graph_structure_suggestions using only graph_structure_ops.v1-compatible
  fields: op, source_path, target_node_id or target, edge, confidence, and
  evidence. These suggestions are never applied directly; the worker converts
  them into graph-structure dry-run jobs that must pass the gate and observer
  approval before source hints are written. Self-precheck these suggestions
  before emitting them using graph_structure_ops.bridge_policy: do not propose
  calls without concrete call evidence, do not point to missing files/nodes,
  and keep unsafe/uncertain corrections in
  known risks or graph_enrich_config_suggestions.

  When a correction requires changing graph-enrichment rules instead of writing
  a source hint, emit it in graph_enrich_config_suggestions using only
  graph_enrich_config_ops.v1-compatible fields: op, rule_id, edge,
  source_evidence, action, downgrade_to, confidence, optional when, and evidence. These
  suggestions are never applied directly; they must pass the config gate and
  observer approval before project override config is written. Pick op only
  from payload.instructions.graph_enrich_config_ops.output_contract.supported_operations,
  and pick edge, action, source_evidence, and downgrade_to only from the
  corresponding supported_* lists in that same contract. Self-precheck these
  suggestions against the configured operation/edge/action contract; do not
  invent aliases such as ensure_rule or depends_on_config unless the supplied
  contract explicitly supports them. If using when.all, every predicate must be
  listed in payload.instructions.graph_enrich_config_ops.output_contract.supported_predicates.
  Prefer config-rule proposals when the
  bottom-up algorithm needs to change rather than a one-off source hint.
